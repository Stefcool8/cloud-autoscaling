spring:
  application:
    name: executor-service

  profiles:
    active: kubernetes

  datasource:
    url: jdbc:postgresql://localhost:5432/executor_db
    username: executor_user
    password: local_secret_password
    driver-class-name: org.postgresql.Driver

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true

server:
  port: 8080